openapi: 3.0.0
info:
  title: Shopisel API Prices Service
  version: 1.0.0
  description: Pedidos relacionados com preços de produtos por loja.

servers:
  - url: http://localhost:5000

paths:
  /prices:
    get:
      summary: Obter preços por produto (e opcionalmente por loja)
      tags: [Price]
      parameters:
        - name: productId
          in: query
          description: ID do produto (obrigatório)
          required: true
          schema:
            type: string
            example: prod_abc123
        - name: storeId
          in: query
          description: ID da loja (opcional - se não enviado devolve todos os preços do produto)
          required: false
          schema:
            type: string
            example: store_xyz789
      responses:
        '200':
          description: Preço(s) encontrado(s)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PriceResponse'
                  - type: array
                    items:
                      $ref: '#/components/schemas/PriceResponse'
        '400':
          description: productId em falta
        '404':
          description: Preço não encontrado (quando storeId é fornecido)
    post:
      summary: Criar preço para um produto numa loja
      tags: [Price]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePriceRequest'
            examples:
              base:
                summary: Exemplo com preço
                value:
                  productId: prod_abc123
                  storeId: store_xyz789
                  priceText: "1.99"
              completo:
                summary: Exemplo completo
                value:
                  productId: prod_abc123
                  storeId: store_xyz789
                  priceText: "1.99"
                  saleText: "1.49"
                  quantityText: "500 g"
                  unitPriceText: "2.98 €/kg"
                  saleDate: "2026-04-20T18:39:30Z"
      responses:
        '201':
          description: Preço criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceResponse'
        '409':
          description: Já existe um preço para este produto nesta loja
        '422':
          description: Dados inválidos (campos em falta)

  /prices/{priceId}:
    put:
      summary: Atualizar o valor de um preço
      tags: [Price]
      parameters:
        - name: priceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePriceRequest'
            examples:
              base:
                summary: Exemplo com preço
                value:
                  priceText: "2.09"
              completo:
                summary: Exemplo completo
                value:
                  priceText: "2.09"
                  saleText: "1.89"
                  quantityText: "500 g"
                  unitPriceText: "4.18 €/kg"
                  saleDate: "2026-04-20T18:39:30Z"
      responses:
        '200':
          description: Preço atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceResponse'
        '404':
          description: Preço não encontrado
        '422':
          description: Dados inválidos (campos em falta)
    delete:
      summary: Apagar um preço
      tags: [Price]
      parameters:
        - name: priceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Preço removido
        '404':
          description: Preço não encontrado

components:
  schemas:
    PriceResponse:
      type: object
      required: [id, productId, storeId, priceText, updatedAt]
      properties:
        id:
          type: string
          example: price_f1e2d3c4b5a6
        productId:
          type: string
          example: prod_abc123
        storeId:
          type: string
          example: store_xyz789
        priceText:
          type: string
          example: "1.99"
        saleText:
          type: string
          nullable: true
          example: "1.49"
        quantityText:
          type: string
          nullable: true
          example: "500 g"
        unitPriceText:
          type: string
          nullable: true
          example: "2.98 €/kg"
        saleDate:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-20T18:39:30Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-02T17:00:00Z"
    CreatePriceRequest:
      type: object
      required: [productId, storeId, priceText]
      properties:
        productId:
          type: string
        storeId:
          type: string
        priceText:
          type: string
        saleText:
          type: string
          nullable: true
        quantityText:
          type: string
          nullable: true
        unitPriceText:
          type: string
          nullable: true
        saleDate:
          type: string
          format: date-time
          nullable: true
    UpdatePriceRequest:
      type: object
      required: [priceText]
      properties:
        priceText:
          type: string
        saleText:
          type: string
          nullable: true
        quantityText:
          type: string
          nullable: true
        unitPriceText:
          type: string
          nullable: true
        saleDate:
          type: string
          format: date-time
          nullable: true
